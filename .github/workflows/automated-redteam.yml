name: Automated Red Team Attack Run

on:
  # Run every Monday at 00:00 UTC (Sunday 7pm EST)
  schedule:
    - cron: '0 0 * * 1'
  
  # Allow manual triggering from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - category
          - chains
      category:
        description: 'Category (for category mode: PI, JB, DE, PE, OM, DOS)'
        required: false
        type: string
      targets:
        description: 'Target models (space-separated: azure-openai claude)'
        required: false
        default: 'azure-openai claude'
        type: string
      verify:
        description: 'Verify findings (weed out false positives before alerting)'
        required: false
        default: true
        type: boolean

jobs:
  # Fast offline gate — must pass before any credentialed scan runs.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🔧 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dev Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ✅ Run Test Suite
        run: pytest

  red-team-scan:
    needs: test          # gate: don't burn API credits if tests fail
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 🔧 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: ⚙️ Setup Environment
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "AZURE_OPENAI_API_KEY=$AZURE_OPENAI_API_KEY" >> .env
          echo "AZURE_OPENAI_ENDPOINT=$AZURE_OPENAI_ENDPOINT" >> .env
          echo "AZURE_OPENAI_DEPLOYMENT=$AZURE_OPENAI_DEPLOYMENT" >> .env
          echo "AZURE_OPENAI_API_VERSION=$AZURE_OPENAI_API_VERSION" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
      
      - name: 🎯 Run Red Team Attack Simulator
        id: attack_run
        env:
          MODE: ${{ github.event.inputs.mode || 'full' }}
          CATEGORY: ${{ github.event.inputs.category || '' }}
          TARGETS: ${{ github.event.inputs.targets || 'azure-openai claude' }}
          VERIFY: ${{ github.event.inputs.verify }}
        run: |
          echo "🔥 RED TEAM ATTACK SIMULATOR - AUTOMATED RUN"
          echo "================================================"
          echo "Mode: $MODE"
          echo "Targets: $TARGETS"
          echo "Triggered by: ${{ github.event_name }}"

          # Verify by default (scheduled runs have no input); disable only when
          # a manual dispatch explicitly sets verify=false.
          VERIFY_FLAG="--verify"
          if [ "$VERIFY" = "false" ]; then VERIFY_FLAG=""; fi
          echo "Verify: ${VERIFY_FLAG:-disabled}"
          echo ""

          # Build command based on mode (chains ignores --verify internally)
          if [ "$MODE" = "category" ] && [ -n "$CATEGORY" ]; then
            python automated_run.py --mode category --category "$CATEGORY" --targets $TARGETS $VERIFY_FLAG
          elif [ "$MODE" = "chains" ]; then
            python automated_run.py --mode chains --targets $TARGETS
          else
            python automated_run.py --mode "$MODE" --targets $TARGETS $VERIFY_FLAG
          fi
          
          # Capture exit code for notifications
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Exit with the actual code
          exit $EXIT_CODE
      
      - name: 📊 Generate Dashboard
        if: always()
        run: |
          echo "📊 Generating dashboard..."
          python generate_dashboard.py -o docs/
          echo "✅ Dashboard generated at docs/index.html"
      
      - name: 📤 Commit and Push Results
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Red Team Bot"
          
          # Add results and dashboard
          git add results/attack_log.json results/automated_run_summary.json docs/index.html
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "🤖 Automated red team run - $TIMESTAMP"
            git push
            echo "✅ Results pushed to repository"
          fi
      
      - name: 📢 Send Success Notification
        if: success() && steps.attack_run.outputs.exit_code == '0'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            python notify.py --status success --file results/automated_run_summary.json
          fi
      
      - name: 🚨 Send Critical Alert
        if: success() && steps.attack_run.outputs.exit_code == '1'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            python notify.py --status critical --file results/automated_run_summary.json
          fi
      
      - name: ❌ Send Failure Notification
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            python notify.py --status failure --message "Red team run failed. Check workflow logs."
          fi
      
      - name: 📝 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: red-team-results-${{ github.run_number }}
          path: |
            results/attack_log.json
            results/automated_run_summary.json
            docs/index.html
          retention-days: 90

# Security: Restrict permissions
permissions:
  contents: write  # Need write for committing results
  actions: read
